<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style/style.css">

</head>

<body class="min-h-screen bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow px-[80px] py-[16px] flex justify-between items-center">
        <div class="flex items-center gap-[4px]">
            <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
            <p class="font-semibold text-[24px] text-slate-800"> GitHub Issues Tracker</p>

        </div>
        <div class="flex gap-[16px] items-center">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-4 flex items-center z-10 gap-[4px] text-gray-500">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>

                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="input input-bordered w-full h-10 pl-10 text-[#64748B] font-normal text-[16px]" />
            </div>

            <button id="searchBtn"
                class="btn btn-primary bg-[#4A00FF] border-none rounded-[4px] text-white text-[16px] font-semibold px-[16px] py-[12px] flex items-center gap-[4px] ">
                <i class="fa-solid fa-plus"></i> New Issue
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="w-[80%] rounded-lg bg-white shadow mx-auto mt-[60px] mb-[16px] p-[24px] ">

        <!-- Tabs -->
        <div class="flex gap-[8px]">
            <button
                class="w-full sm:w-auto bg-white border border-gray-200 px-10 py-2 rounded-[4px] font-semibold text-[16px] text-[#64748B]"
                data-status="all">All</button>
            <button
                class="w-full sm:w-auto bg-white border border-gray-200 px-10 py-2 rounded-[4px] font-medium text-[16px] text-[#64748B]"
                data-status="open">Open</button>
            <button
                class="w-full sm:w-auto bg-white border border-gray-200 px-10 py-2 rounded-[4px] font-medium text-[16px] text-[#64748B]"
                data-status="closed">Closed</button>
        </div>
    </div>

    <!-- Issue Count -->
    <div class="bg-white rounded-lg shadow w-[80%] mx-auto p-[24px] flex justify-between items-center mt-[16px]">

        <div class="flex items-center gap-[8px]">
            <div class="bg-[#ECE4FF] p-3 rounded-full flex items-center justify-center w-[52px] h-[52px]">
                <img src="./assets/Aperture.png" alt="">
            </div>

            <div>
                <h2 class="text-[20px] font-bold text-slate-800 leading-tight">
                    <span id="issueCount">50</span> Issues
                </h2>
                <p class="text-[16px] font-normal text-[#64748B]">
                    Track and manage your project issues
                </p>
            </div>
        </div>

        <div class="flex gap-[16px] text-[16px] font-medium text-slate-700">
            <div class="flex items-center gap-[8px]">
                <span class="w-3 h-3 bg-[#22C55E] rounded-full"></span>
                <span>Open</span>
            </div>

            <div class=" flex items-center gap-[8px]">
                <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                <span>Closed</span>
            </div>
        </div>
    </div>


    <div id="loader" class="flex justify-center my-10 hidden">
        <span class="loading loading-spinner loading-lg text-[#4A00FF]"></span>
    </div>
    </div>

    <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
    </div>



    <!-- Loading Spinner -->
    <div id="loader" class="flex justify-center my-10 hidden">
        <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>

    <!-- Issues Grid -->
    <div id="issuesContainer" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    </div>

    </div>

    <!-- Modal -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box">

            <h3 id="modalTitle" class="text-lg font-bold mb-2"></h3>

            <p id="modalDesc" class="text-sm text-gray-600 mb-4"></p>

            <div class="space-y-2 text-sm">

                <p><b>Status:</b> <span id="modalStatus"></span></p>
                <p><b>Author:</b> <span id="modalAuthor"></span></p>
                <p><b>Priority:</b> <span id="modalPriority"></span></p>
                <p><b>Created:</b> <span id="modalDate"></span></p>

            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="script.js"></script>
</body>

</html>
